# Webhook 通知推送服务
#
# 快速启动:
#   1. mkdir -p hooks && touch .env
#   2. 编辑 .env，填入通知平台的 Webhook 地址 / Token
#   3. docker compose up -d
#
# 控制台: http://localhost:9000/ui
# 各平台通知地址:
#   飞书:     http://localhost:9000/hooks/feishu?msg=Hello
#   钉钉:     http://localhost:9000/hooks/dingtalk?msg=Hello
#   企业微信:  http://localhost:9000/hooks/wecom?msg=Hello
#   Telegram: http://localhost:9000/hooks/telegram?msg=Hello
#   Slack:    http://localhost:9000/hooks/slack?msg=Hello
#   Discord:  http://localhost:9000/hooks/discord?msg=Hello
#   Server酱: http://localhost:9000/hooks/serverchan?msg=Hello&title=标题

services:
  webhook:
    image: ghcr.io/always1ov/webhook:latest
    restart: unless-stopped
    ports:
      - "9000:9000"
    env_file:
      - path: .env
        required: false
    environment:
      HOST: "0.0.0.0"
      PORT: "9000"
      HOT_RELOAD: "true"
      VERBOSE: "true"
      HOOKS_DIR: "/hooks"
      LANGUAGE: "zh-CN"
      WEBUI: "true"
    volumes:
      - ./hooks:/hooks:ro
      # 如需自定义通知脚本，取消下行注释并在本地创建 notify 目录
      # - ./notify:/notify
