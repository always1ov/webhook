# Server酱（方糖）通知 Hook - 推送消息到微信
# 注册地址：https://sct.ftqq.com
#
# 调用方式一（GET）:
#   curl "http://localhost:9000/hooks/serverchan?msg=Hello&title=测试"
#
# 调用方式二（POST JSON）:
#   curl -X POST http://localhost:9000/hooks/serverchan \
#     -H "Content-Type: application/json" \
#     -d '{"msg": "# 服务器告警\n\nCPU 使用率 **95%**", "title": "紧急告警"}'

- id: serverchan
  execute-command: /notify/serverchan.sh
  command-working-directory: /notify
  include-command-output-in-response: true
  include-command-out-in-response-on-error: true
  pass-environment-to-command:
    - source: payload
      name: msg
      envname: MSG
    - source: payload
      name: title
      envname: TITLE
    - source: url
      name: msg
      envname: MSG_QUERY
    - source: url
      name: title
      envname: TITLE_QUERY
