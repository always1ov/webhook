# Slack Incoming Webhook 通知 Hook
#
# 调用方式一（GET）:
#   curl "http://localhost:9000/hooks/slack?msg=Hello+Team"
#
# 调用方式二（POST JSON）:
#   curl -X POST http://localhost:9000/hooks/slack \
#     -H "Content-Type: application/json" \
#     -d '{"msg": "New PR merged: feat/awesome-feature", "title": "GitHub"}'

- id: slack
  execute-command: /notify/slack.sh
  command-working-directory: /notify
  include-command-output-in-response: true
  include-command-out-in-response-on-error: true
  pass-environment-to-command:
    - source: payload
      name: msg
      envname: MSG
    - source: payload
      name: title
      envname: TITLE
    - source: url
      name: msg
      envname: MSG_QUERY
    - source: url
      name: title
      envname: TITLE_QUERY
