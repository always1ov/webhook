- id: notify
  execute-command: /data/scripts/notify.sh
  command-working-directory: /
  http-methods:
    - GET
    - POST
  pass-environment-to-command:
    - source: url
      name: msg
      envname: MSG
    - source: url
      name: title
      envname: TITLE
    - source: payload
      name: msg
      envname: MSG
    - source: payload
      name: title
      envname: TITLE
  response-message: "通知已发送"
