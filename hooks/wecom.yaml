# 企业微信群机器人通知 Hook
#
# 调用方式一（GET）:
#   curl "http://localhost:9000/hooks/wecom?msg=服务器 CPU 使用率超过 90%"
#
# 调用方式二（POST JSON）:
#   curl -X POST http://localhost:9000/hooks/wecom \
#     -H "Content-Type: application/json" \
#     -d '{"msg": "磁盘空间不足，请立即处理", "title": "磁盘告警"}'

- id: wecom
  execute-command: /notify/wecom.sh
  command-working-directory: /notify
  include-command-output-in-response: true
  include-command-out-in-response-on-error: true
  pass-environment-to-command:
    - source: payload
      name: msg
      envname: MSG
    - source: payload
      name: title
      envname: TITLE
    - source: url
      name: msg
      envname: MSG_QUERY
    - source: url
      name: title
      envname: TITLE_QUERY
