# 钉钉自定义机器人通知 Hook
#
# 调用方式一（GET，适合简单场景）:
#   curl "http://localhost:9000/hooks/dingtalk?msg=Hello&title=通知"
#
# 调用方式二（POST JSON，适合复杂场景）:
#   curl -X POST http://localhost:9000/hooks/dingtalk \
#     -H "Content-Type: application/json" \
#     -d '{"msg": "代码已合并到 main", "title": "GitHub 通知"}'

- id: dingtalk
  execute-command: /notify/dingtalk.sh
  command-working-directory: /notify
  include-command-output-in-response: true
  include-command-out-in-response-on-error: true
  pass-environment-to-command:
    - source: payload
      name: msg
      envname: MSG
    - source: payload
      name: title
      envname: TITLE
    - source: url
      name: msg
      envname: MSG_QUERY
    - source: url
      name: title
      envname: TITLE_QUERY
